<section class="empty-state">
    <div class="empty-state__media">
        <img src="https://source.unsplash.com/800x600/?remote-work,desk" alt="{{ title }}">
    </div>
    <div class="empty-state__body">
        <span class="empty-state__pill">Fresh start</span>
        <h3>{{ title }}</h3>
        <p>{{ body|default:message }}</p>
        {% if action_url and action_label %}
            <a href="{{ action_url }}" class="btn btn-brand">{{ action_label }}</a>
        {% endif %}
    </div>
</section>
