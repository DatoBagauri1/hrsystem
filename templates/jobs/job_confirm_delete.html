{% extends "base.html" %}

{% block title %}Delete Vacancy | Job Platform{% endblock %}

{% block content %}
<section class="section-block">
    <div class="container">
        <div class="confirm-card card-panel confirmation-shell" style="background-image: linear-gradient(140deg, rgba(15, 23, 42, 0.86), rgba(185, 28, 28, 0.78)), url('https://source.unsplash.com/1200x800/?office,warning');">
            <p class="eyebrow-text text-white-50">Delete vacancy</p>
            <h1 class="text-white">Delete "{{ job.title }}"?</h1>
            <p class="text-white-50">This action removes the vacancy and its application history from the platform. This cannot be undone.</p>
            <form method="post" class="d-flex flex-wrap gap-3 mt-4">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-lg">Yes, delete vacancy</button>
                <a href="{% url 'jobs:job-detail' job.slug %}" class="btn btn-outline-light btn-lg">Cancel</a>
            </form>
        </div>
    </div>
</section>
{% endblock %}
